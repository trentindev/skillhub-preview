name: CI/CD SkillHub

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint-and-test-back:
    name: Lint et tests du back
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Installation des dépendances
        working-directory: back
        run: npm ci

      - name: Linting
        working-directory: back
        run: npm run lint

      - name: Lancement des tests
        working-directory: back
        run: npm test

  lint-and-test-front:
    name: Lint et tests du front
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installation des dépendances
        working-directory: front
        run: npm ci

      - name: Linting
        working-directory: front
        run: npm run lint

      - name: Lancement des tests
        working-directory: front
        run: npm test

  build-and-push-images:
    name: Build et push des images Docker
    runs-on: ubuntu-latest
    needs: [lint-and-test-back, lint-and-test-front]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Authentification sur ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et push de l'image back
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/skillhub-back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build et push de l'image front
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/skillhub-front:latest
          build-args: |
            VITE_BACK_URL=http://${{ secrets.DEPLOY_HOST }}:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Déploiement sur le serveur
    runs-on: ubuntu-latest
    needs: build-and-push-images
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/skillhub
            docker compose pull
            docker compose up -d
            docker image prune -f
