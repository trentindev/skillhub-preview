name: CI SkillHub

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint-and-test-back:
    name: Lint et tests du back
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Installation des dépendances
        working-directory: back
        run: npm ci

      - name: Lancement des tests
        working-directory: back
        run: npm test

  lint-and-test-front:
    name: Lint et tests du front
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Installation des dépendances
        working-directory: front
        run: npm ci

      - name: Linting
        working-directory: front
        run: npm run lint

      - name: Lancement des tests
        working-directory: front
        run: npm test

  build-images:
    name: Build des images Docker
    runs-on: ubuntu-latest
    needs: [lint-and-test-back, lint-and-test-front]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image back
        uses: docker/build-push-action@v5
        with:
          context: ./back
          push: false
          tags: skillhub-back:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build de l'image front
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: false
          tags: skillhub-front:latest
          build-args: |
            VITE_BACK_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max
